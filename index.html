<!DOCTYPE html>
<html lang="ku">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>🕵️ یاری جاسوس</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@400;500;600;700&family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#070910;--c1:#0c1018;--c2:#111520;--c3:#161c2c;
  --border:rgba(255,255,255,0.08);
  --accent:#7b6fff;--green:#00d49a;--red:#ff2244;--gold:#ffc94d;
  --muted:#566078;--text:#dde2f0;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}

/* ═══ CRITICAL KURDISH FONT FIX ═══
   Noto Naskh Arabic has perfect Kurdish/Arabic ligatures and glyph joining.
   font-variant-ligatures:common-ligatures ensures letters connect properly.
   text-rendering:optimizeLegibility activates OpenType features.
*/
body{
  font-family:'Noto Naskh Arabic','Tajawal',sans-serif;
  font-variant-ligatures:common-ligatures;
  font-feature-settings:"liga" 1,"calt" 1,"kern" 1;
  text-rendering:optimizeLegibility;
  -webkit-font-smoothing:antialiased;
  background:var(--bg);color:var(--text);
  min-height:100vh;direction:rtl;overflow-x:hidden;
  font-size:16px;line-height:1.6;
}

/* All text elements inherit proper Kurdish rendering */
input,button,textarea,select{
  font-family:'Noto Naskh Arabic','Tajawal',sans-serif;
  font-variant-ligatures:common-ligatures;
  font-feature-settings:"liga" 1,"calt" 1;
  text-rendering:optimizeLegibility;
}

.pg{display:none;min-height:100vh;align-items:center;justify-content:center;padding:16px 14px 32px;flex-direction:column}
.pg.on{display:flex}

.card{background:var(--c1);border:1px solid var(--border);border-radius:22px;padding:24px 20px;width:100%;max-width:430px}
.ctitle{font-size:1.5rem;font-weight:900;margin-bottom:4px;font-family:'Noto Naskh Arabic',sans-serif;font-feature-settings:"liga" 1}
.csub{color:var(--muted);font-size:14px;margin-bottom:20px;font-family:'Noto Naskh Arabic',sans-serif}

.flabel{display:block;font-size:13px;color:var(--muted);margin:14px 0 5px;font-family:'Noto Naskh Arabic',sans-serif}
input{width:100%;padding:13px 15px;border-radius:12px;border:1.5px solid var(--border);background:var(--c2);color:var(--text);font-size:16px;outline:none;transition:border-color .2s}
input:focus{border-color:var(--accent)}
input::placeholder{color:var(--muted)}

.btn{display:block;width:100%;padding:15px;margin-top:12px;border:none;border-radius:14px;font-size:15px;font-weight:700;cursor:pointer;transition:transform .1s,opacity .15s;font-family:'Noto Naskh Arabic',sans-serif;font-feature-settings:"liga" 1}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.3;cursor:not-allowed;transform:none!important}
.bp{background:linear-gradient(135deg,#7b6fff,#5b4cdf);color:#fff}
.bg{background:linear-gradient(135deg,#00d49a,#00a876);color:#041a12}
.br{background:linear-gradient(135deg,#ff2244,#c00);color:#fff}
.bd{background:var(--c2);color:var(--text);border:1px solid var(--border)}
.bgold{background:linear-gradient(135deg,#ffc94d,#e6a800);color:#1a1000}

.mode-grid{display:grid;grid-template-columns:1fr;gap:12px;margin-top:6px}
.mode-card{background:var(--c2);border:1.5px solid var(--border);border-radius:16px;padding:24px 14px;text-align:center;cursor:pointer;transition:all .2s;margin:0;width:100%;font-family:'Noto Naskh Arabic',sans-serif}
.mode-card:hover{border-color:var(--accent);background:rgba(123,111,255,.08)}
.mode-card:active{transform:scale(.97)}
.mode-icon{font-size:2.4rem;display:block;margin-bottom:8px}
.mode-label{font-size:16px;font-weight:900;display:block;color:var(--text);font-family:'Noto Naskh Arabic',sans-serif;font-feature-settings:"liga" 1}
.mode-sub{font-size:13px;color:var(--muted);display:block;margin-top:3px;font-family:'Noto Naskh Arabic',sans-serif}

.plist{margin-top:4px;min-height:40px}
.pitem{display:flex;align-items:center;justify-content:space-between;background:var(--c2);border-radius:13px;padding:12px 14px;margin-bottom:8px;border:1px solid var(--border);animation:fadeup .25s ease}
@keyframes fadeup{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}
.pleft{display:flex;align-items:center;gap:10px}
.pdot{width:8px;height:8px;border-radius:50%;background:var(--green);flex-shrink:0}
.pname{font-size:15px;font-weight:700;font-family:'Noto Naskh Arabic',sans-serif;font-feature-settings:"liga" 1}

.srow{display:flex;justify-content:space-between;align-items:center;font-size:14px;margin-bottom:10px}
.srow-label{color:var(--muted);font-family:'Noto Naskh Arabic',sans-serif}
.hr{height:1px;background:var(--border);margin:16px 0}

#offtimer{font-size:3rem;font-weight:700;text-align:center;letter-spacing:5px;padding:14px;border-radius:18px;background:var(--c2);border:1px solid var(--border);margin-bottom:14px;font-family:'Noto Naskh Arabic',sans-serif}
#offtimer.red{color:var(--red);animation:blink 1s infinite}
@keyframes blink{50%{opacity:.4}}

.rcard{border-radius:18px;padding:20px 16px;text-align:center;margin:12px 0;line-height:2;font-family:'Noto Naskh Arabic',sans-serif;font-feature-settings:"liga" 1}
.rcard .em{font-size:2.4rem;display:block}
.rcard .wd{font-size:1.9rem;font-weight:900;display:block;margin-top:2px;font-family:'Noto Naskh Arabic',sans-serif;font-feature-settings:"liga" 1}
.rcard small{font-size:13px;opacity:.7;font-family:'Noto Naskh Arabic',sans-serif}
.rspy{background:rgba(255,34,68,.15);border:1.5px solid var(--red)}
.rnorm{background:rgba(0,212,154,.15);border:1.5px solid var(--green)}

.hintbox{background:rgba(255,201,77,.08);border:1px solid rgba(255,201,77,.3);border-radius:12px;padding:11px 15px;font-size:14px;margin-bottom:12px;text-align:center;display:none;font-family:'Noto Naskh Arabic',sans-serif;font-feature-settings:"liga" 1}

.vgrid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:10px}
.vbtn{margin:0;padding:13px 8px;border-radius:14px;background:rgba(255,201,77,.07);border:1.5px solid rgba(255,201,77,.25);color:var(--gold);font-size:14px;font-weight:700;cursor:pointer;font-family:'Noto Naskh Arabic',sans-serif;font-feature-settings:"liga" 1;transition:background .15s}
.vbtn:hover{background:rgba(255,201,77,.15)}
.vbtn:disabled{opacity:.3;cursor:not-allowed}

.resbox{border-radius:18px;padding:20px 16px;text-align:center;font-size:1rem;line-height:2;margin:14px 0;font-family:'Noto Naskh Arabic',sans-serif;font-feature-settings:"liga" 1}
.rwin{background:rgba(0,212,154,.1);border:1.5px solid var(--green)}
.rlose{background:rgba(255,34,68,.1);border:1.5px solid var(--red)}

.off-overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);display:none;align-items:center;justify-content:center;z-index:100;padding:20px}
.off-overlay.on{display:flex}
.off-inner{background:var(--c1);border:1px solid var(--border);border-radius:22px;padding:28px 22px;width:100%;max-width:380px;text-align:center}
.big-pname{font-size:1.8rem;font-weight:900;margin-bottom:4px;font-family:'Noto Naskh Arabic',sans-serif;font-feature-settings:"liga" 1}

.status{text-align:center;color:var(--muted);font-size:13px;margin:8px 0;font-family:'Noto Naskh Arabic',sans-serif}
.err{color:var(--red);text-align:center;font-size:13px;margin-top:8px;min-height:18px;font-family:'Noto Naskh Arabic',sans-serif}
.ok{color:var(--green);text-align:center;font-size:12px;min-height:16px;font-family:'Noto Naskh Arabic',sans-serif}

#toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:var(--c2);border:1px solid var(--border);border-radius:12px;padding:11px 22px;font-size:13px;font-weight:700;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;z-index:9999;font-family:'Noto Naskh Arabic',sans-serif}
#toast.show{opacity:1}

/* Name input row */
.name-row{display:flex;align-items:center;gap:8px;margin-top:8px}
.name-row input{flex:1;margin:0}
.del-btn{background:rgba(255,34,68,.12);border:1px solid rgba(255,34,68,.25);color:var(--red);border-radius:10px;padding:12px 14px;font-size:16px;cursor:pointer;flex-shrink:0;line-height:1}
.del-btn:hover{background:rgba(255,34,68,.22)}
</style>
</head>
<body>
<div id="toast"></div>

<!-- ════ MAIN MENU ════ -->
<div class="pg on" id="pgMenu">
  <div class="card">
    <div class="ctitle">🕵️ یاری جاسوس</div>
    <p class="csub">یاری نهێنی — کێ جاسوسە؟</p>
    <div class="mode-grid">
      <button class="mode-card" onclick="goOffline()">
        <span class="mode-icon">📱</span>
        <span class="mode-label">دەستپێکردنی یاری</span>
        <span class="mode-sub">یەک مۆبایل — هەموو پلەیەرەکان</span>
      </button>
    </div>
  </div>
</div>

<!-- ════ OFFLINE SETUP ════ -->
<div class="pg" id="pgOffline">
  <div class="card">
    <div class="ctitle">📱 ڕێکخستنی یاری</div>
    <p class="csub">ناوی پلەیەرەکان زیاد بکە</p>
    <span class="flabel">🕵️ ژمارەی جاسوسەکان</span>
    <input id="offSpies" type="number" min="1" max="5" value="1">
    <span class="flabel">⏱️ ماوە (خولەک)</span>
    <input id="offMins" type="number" min="1" max="20" value="5">
    <div class="hr"></div>
    <p style="font-size:14px;color:var(--muted);margin-bottom:6px;font-family:'Noto Naskh Arabic',sans-serif">👤 ناوی پلەیەرەکان زیاد بکە (کەمترین ٢)</p>
    <div id="offNameList"></div>
    <button class="btn bd" style="margin-top:12px" onclick="addOffName()">➕ زیادکردنی پلەیەر</button>
    <button class="btn bp" id="offStartBtn" onclick="startOffGame()" style="margin-top:8px" disabled>🚀 دەستپێکردن</button>
    <div id="offErr" class="err"></div>
    <button class="btn bd" onclick="goPage('pgMenu')" style="margin-top:8px">← گەڕانەوە</button>
  </div>
</div>

<!-- ════ OFFLINE ROLE REVEAL OVERLAY ════ -->
<div class="off-overlay" id="offOverlay">
  <div class="off-inner">
    <div style="font-size:12px;color:var(--muted);margin-bottom:6px;font-family:'Noto Naskh Arabic',sans-serif" id="offStepLbl">گامی ١ لە ٦</div>
    <div class="big-pname" id="offPName">پلەیەری ١</div>
    <p class="csub" style="margin-bottom:18px">مۆبایلەکەت بگرە — تەنها تۆ ببینە!</p>
    <button class="btn bp" id="offRevBtn" onclick="showOffRole()">👁️ پیشاندانی ڕۆڵ</button>
    <div id="offRoleCard" style="display:none;margin-top:14px"></div>
    <button class="btn bg" id="offNextBtn" onclick="nextOffPlayer()" style="display:none;margin-top:12px">➡️ داهاتوو</button>
  </div>
</div>

<!-- ════ OFFLINE GAME ════ -->
<div class="pg" id="pgOffGame">
  <div class="card">
    <div id="offtimer">⏱️ 00:00</div>
    <div class="hintbox" id="offHint"></div>
    <div class="rcard" id="offGameRole"></div>
    <div class="hr"></div>
    <div style="text-align:center;font-weight:700;margin-bottom:8px;font-size:15px;font-family:'Noto Naskh Arabic',sans-serif;font-feature-settings:'liga' 1">🗳️ دەنگ بدە — جاسوس کێیە؟</div>
    <p class="status" id="offVMsg"></p>
    <div class="vgrid" id="offVGrid"></div>
    <div id="offRes" style="display:none"></div>
    <div id="offEnd" style="display:none">
      <button class="btn bg" onclick="restartOff()">🔄 یاری نوێ</button>
      <button class="btn bd" onclick="goPage('pgMenu')" style="margin-top:8px">🏠 گەڕانەوە</button>
    </div>
  </div>
</div>

<script>
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  WORDS
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const WORDS = [
  {cat:"شار/ووڵات",      hint:"شوێنێکی ناسراو",        items:["سلێمانی","هەولێر","دهۆک","کرکوک","بەغدا","کەنەدا","ئەمەریکا","نیۆڕک","لەندەن","پاریس","ئیتالیا","ئالمانیا","تورکیا","ئێران","ژاپۆن","دوبەی"]},
  {cat:"خواردن",          hint:"خواردنێکی ناسراو",      items:["کەباب","پیتزا","بەریانی","دۆنەر","ماسی","برنج","یاپراخ","شفتە","کفتە","مریشک","گۆشت","سووپ","هەمبەرگەر","پاستا","ساندویچ","لازانیا","سوشی","شاورما"]},
  {cat:"سۆشیال میدیا",   hint:"پلاتفۆرمی ئینتەرنێت",  items:["یوتوب","تیکتۆک","فەیسبووک","ئینستاگرام","ئێکس","تویچ","سناپ","دیسکۆرد","واتساپ","تێلێگرام","پینتەرست"]},
  {cat:"ئاژەڵ",           hint:"زیندووەکان",             items:["سەگ","پشیلە","مار","گوورگ","شێر","بزن","کەر","مەیموون","ووشتر","کۆتر","قاز","نەهەنگ","زەرافە","ئەسپ","پلەنگ"]},
  {cat:"شت/بێگیان",      hint:"شتێکی ڕۆژانە",          items:["کورسی","فڕن","قەنەفە","زۆپا","سەیارە","تەیارە","مۆبایل","تەلەفزیۆن","بەلەم","بەرد","جل","کاتژمێر","لاپتۆپ","فریدجەر","ماکرۆوێف"]},
  {cat:"وەرزش",           hint:"چالاکییەکی جەستەیی",    items:["فوتبۆل","بەسکێتبۆل","تێنیس","شناکردن","والێبۆل","بۆکس","گۆڵف","تەکواندۆ"]},
  {cat:"فیلم",            hint:"فیلمێکی ناسراو",        items:["تایتانیک","ئەڤاتار","ئینسێپشن","ئینتەرستێلار","مەتریکس","گودفادەر","هاری پۆتەر","باتمان","سوپەرمان","جۆکەر","ئەڤنجەرز"]},
  {cat:"پیشە",            hint:"کارێکی مرۆڤ",           items:["دکتۆر","مامۆستا","ئەندازیار","پۆلیس","پەرستار","شۆفێر","وەرزشکار","نووسەر","دیزاینەر","دەلاڵ"]},

  // ⚽ NEW: Football Teams
  {cat:"تیمی فوتبۆل ⚽",  hint:"تیمێکی ناسراوی فوتبۆل", items:[
    "مانچستەر سیتی","ڕیال مادرید","بارسەلۆنا","ئاک میلان","بایەرن موونیخ",
    "لیڤەرپوول","مانچستەر یونایتد","چێلسی","ئارسنال","توتنهام",
    "یووێنتووس","ئینتەر میلان","پاری سەن-ژەرمێن","بۆرووسیا دۆرتموند",
    "ئاتلێتیکۆ مادرید","نەپۆلی","ئەیاکس","بنفیکا","پۆرتۆ","سەڤیا",
    "ڤالێنسیا","ڤیاڕیال","لاتسیو","ڕۆما","فیۆرێنتینا",
    "لێستەر سیتی","ئێڤەرتۆن","نیووکاسڵ","ئاستۆن ڤیلا","وێست هام"
  ]},

  // 🌟 NEW: Football Players
  {cat:"یاریزانی فوتبۆل 🌟", hint:"یاریزانێکی ناسراوی فوتبۆل", items:[
    "هالاند","مێسی","ڕۆنالدۆ","ئەمبابێ","نەیمار","مۆدریچ",
    "ڤینیسیووس جوونیۆر","بێلینگهام","سالا","دی بروینە",
    "لێواندۆوسکی","بێنزەما","ئیبراهیمۆڤیچ","نێیمار","سوناێ",
    "تریپییەر","ڕاشفۆرد","سانچۆ","گریلیش","فۆدن",
    "تیاگۆ ئالکانتارا","پێدری","گاڤی","بارسیا","یامال",
    "ئۆسیمهێن","دیۆگۆ جۆتا","دارویین نوونیەز","کیلیان مبابێ","زیدان"
  ]}
];

function pickSecret(){
  const g = WORDS[Math.floor(Math.random()*WORDS.length)];
  return {word:g.items[Math.floor(Math.random()*g.items.length)], cat:g.cat, hint:g.hint};
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  STATE
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
let offPlayers=[], offSecret={}, offCurIdx=0, offTimerID=null, offRevealed=false;
let offNameCount=0;

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  HELPERS
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function goPage(id){
  document.querySelectorAll('.pg').forEach(p=>p.classList.remove('on'));
  document.getElementById(id).classList.add('on');
}
window.goPage = goPage;

function toast(msg){
  const e=document.getElementById('toast');
  e.innerText=msg; e.classList.add('show');
  setTimeout(()=>e.classList.remove('show'),2500);
}
function setErr(id,m){const e=document.getElementById(id);if(e)e.innerText=m;}
function stopOffTimer(){clearInterval(offTimerID);offTimerID=null;}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  OFFLINE SETUP
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
window.goOffline = function(){
  offNameCount=0;
  document.getElementById('offNameList').innerHTML='';
  setErr('offErr','');
  addOffName(); addOffName();
  goPage('pgOffline');
};

function updateStartBtn(){
  document.getElementById('offStartBtn').disabled = offNameCount < 2;
}

window.addOffName = function(){
  if(offNameCount>=20){toast('زیاتر لە ٢٠ پلەیەر ناکرێت');return;}
  const idx=offNameCount++;
  const div=document.createElement('div');
  div.id=`offNameDiv_${idx}`;
  div.innerHTML=`
    <span class="flabel">👤 پلەیەری ${idx+1}</span>
    <div class="name-row">
      <input type="text" id="offN_${idx}" maxlength="14" placeholder="ناوی پلەیەری ${idx+1}">
      <button class="del-btn" onclick="removeOffName(${idx})">✕</button>
    </div>`;
  document.getElementById('offNameList').appendChild(div);
  updateStartBtn();
};

window.removeOffName = function(idx){
  const div=document.getElementById(`offNameDiv_${idx}`);
  if(div) div.remove();
  // Recount visible inputs
  const remaining=document.querySelectorAll('[id^="offN_"]').length;
  offNameCount=remaining;
  // Re-number labels
  document.querySelectorAll('#offNameList > div').forEach((d,i)=>{
    const lbl=d.querySelector('.flabel');
    const inp=d.querySelector('input');
    if(lbl) lbl.innerText=`👤 پلەیەری ${i+1}`;
    if(inp) inp.placeholder=`ناوی پلەیەری ${i+1}`;
  });
  updateStartBtn();
};

window.startOffGame = function(){
  const spyCnt=parseInt(document.getElementById('offSpies').value)||1;
  const mins  =parseInt(document.getElementById('offMins').value)||5;

  // Collect visible names
  const names=[];
  document.querySelectorAll('#offNameList input[type="text"]').forEach(inp=>{
    const v=inp.value.trim();
    if(v) names.push(v);
    else if(!v){
      inp.focus();
      setErr('offErr','⚠️ هەموو ناوەکان پڕ بکەرەوە');
    }
  });

  if(names.length<2){setErr('offErr','⚠️ کەمترین ٢ پلەیەر');return;}
  if(spyCnt>=names.length){setErr('offErr','⚠️ ژمارەی جاسوس زیادتره');return;}

  // Check for blank names
  const allFilled=Array.from(document.querySelectorAll('#offNameList input[type="text"]')).every(i=>i.value.trim());
  if(!allFilled){setErr('offErr','⚠️ هەموو ناوەکان پڕ بکەرەوە');return;}
  setErr('offErr','');

  offSecret=pickSecret();
  offSecret._mins=mins;

  const shuffled=[...names.keys()].sort(()=>Math.random()-0.5);
  const spyIdx=shuffled.slice(0,spyCnt);

  offPlayers=names.map((name,i)=>({name, isSpy:spyIdx.includes(i)}));
  offCurIdx=0;
  showOffCover();
};

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  OFFLINE REVEAL
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function showOffCover(){
  if(offCurIdx>=offPlayers.length){
    document.getElementById('offOverlay').classList.remove('on');
    launchOffGame();
    return;
  }
  const p=offPlayers[offCurIdx];
  document.getElementById('offOverlay').classList.add('on');
  document.getElementById('offStepLbl').innerText=`گامی ${offCurIdx+1} لە ${offPlayers.length}`;
  document.getElementById('offPName').innerText=`👤 ${p.name}`;
  document.getElementById('offRevBtn').style.display='block';
  document.getElementById('offRevBtn').disabled=false;
  document.getElementById('offRoleCard').style.display='none';
  document.getElementById('offRoleCard').innerHTML='';
  document.getElementById('offNextBtn').style.display='none';
  offRevealed=false;
}

window.showOffRole=function(){
  if(offRevealed)return;
  offRevealed=true;
  const p=offPlayers[offCurIdx];
  document.getElementById('offRevBtn').style.display='none';
  const el=document.getElementById('offRoleCard');
  el.style.display='block';
  if(p.isSpy){
    el.innerHTML=`<div class="rcard rspy">
      <span class="em">🕵️</span>
      تۆ <strong>جاسوسیت!</strong>
      <span class="wd">جۆر: ${offSecret.cat}</span>
      <small>وشەی نهێنی نازانیت — زیرەکانە!</small>
    </div>`;
  } else {
    el.innerHTML=`<div class="rcard rnorm">
      <span class="em">✅</span>
      تۆ <strong>شارەزایی!</strong>
      <span class="wd">📌 ${offSecret.word}</span>
      <small>ئەم وشەیە بپارێزە!</small>
    </div>`;
  }
  document.getElementById('offNextBtn').style.display='block';
};

window.nextOffPlayer=function(){offCurIdx++;showOffCover();};

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  OFFLINE GAME
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function launchOffGame(){
  goPage('pgOffGame');
  document.getElementById('offHint').style.display='none';
  document.getElementById('offRes').style.display='none';
  document.getElementById('offEnd').style.display='none';
  document.getElementById('offVMsg').innerText='';
  document.getElementById('offtimer').classList.remove('red');

  const roleEl=document.getElementById('offGameRole');
  roleEl.className='rcard';
  roleEl.style.cssText='background:rgba(255,255,255,.04);border:1px solid var(--border)';
  roleEl.innerHTML=`🗣️ <strong>کاتی گفتوگۆ!</strong><br>
    <small style="color:var(--muted)">جۆر: <strong style="color:var(--gold)">${offSecret.cat}</strong></small>`;

  const mins=offSecret._mins||5;
  let t=mins*60, half=Math.floor(t/2), hintShown=false;
  updateOffClock(t);
  stopOffTimer();
  offTimerID=setInterval(()=>{
    t--; updateOffClock(t);
    if(t<=10) document.getElementById('offtimer').classList.add('red');
    if(!hintShown&&t<=half){
      hintShown=true;
      const hb=document.getElementById('offHint');
      hb.style.display='block';
      hb.innerHTML=`💡 <strong>هینتی دووەم:</strong> ${offSecret.hint}`;
    }
    if(t<=0) stopOffTimer();
  },1000);

  const grid=document.getElementById('offVGrid');
  grid.innerHTML='';
  offPlayers.forEach((p,i)=>{
    const b=document.createElement('button');
    b.className='vbtn';
    b.innerText=`🧑 ${p.name}`;
    b.onclick=()=>offVote(i,p.name);
    grid.appendChild(b);
  });
}

function updateOffClock(t){
  const m=String(Math.floor(t/60)).padStart(2,'0');
  const s=String(t%60).padStart(2,'0');
  document.getElementById('offtimer').innerText=`⏱️ ${m}:${s}`;
}

window.offVote=function(idx,name){
  stopOffTimer();
  document.querySelectorAll('#offVGrid .vbtn').forEach(b=>b.disabled=true);
  document.getElementById('offVMsg').innerText='';

  const caught=offPlayers[idx].isSpy;
  const spyNames=offPlayers.filter(p=>p.isSpy).map(p=>p.name).join('، ');

  const el=document.getElementById('offRes');
  el.style.display='block';
  if(caught){
    el.className='resbox rwin';
    el.innerHTML=`🎉 <strong>سەرکەوتن!</strong><br>جاسوس <strong>${name}</strong> دەستگیر کرا!<br>
      <small style="opacity:.7">جاسوسەکان: ${spyNames}</small><br>
      <small style="opacity:.7">وشەی نهێنی: <strong style="color:var(--gold)">${offSecret.word}</strong></small>`;
  } else {
    el.className='resbox rlose';
    el.innerHTML=`😈 <strong>جاسوسەکە بردی!</strong><br>دەنگ دەدرا بۆ <strong>${name}</strong><br>
      <small style="opacity:.7">جاسوسەکان: ${spyNames}</small><br>
      <small style="opacity:.7">وشەی نهێنی: <strong style="color:var(--gold)">${offSecret.word}</strong></small>`;
  }
  document.getElementById('offEnd').style.display='block';
};

window.restartOff=function(){
  stopOffTimer();
  goPage('pgOffline');
};
</script>
</body>
