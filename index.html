<!DOCTYPE html>
<html lang="ku">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🕵️ Online Spy Game</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<h2>🕵️ Online Spy Game</h2>

<div id="home">
<input id="name" placeholder="ناوی خۆت">
<button onclick="createRoom()">🎮 دروستکردنی Room</button>
<input id="roomInput" placeholder="Room Code">
<button onclick="joinRoom()">➡️ چوونە ژوورەوە</button>
</div>

<div id="room" class="hidden">
<h3 id="roomCodeText"></h3>
<div id="players"></div>
<button id="startBtn" onclick="startGame()">🚀 دەستپێکردن</button>
</div>

<div id="game" class="hidden">
<div id="timer"></div>
<div class="card" id="roleCard"></div>
<div id="voting"></div>
<div id="result"></div>
<button id="restartBtn" onclick="restartGame()" class="hidden">🔄 یاری نوێ</button>
</div>

</div>

<script type="module" src="script.js"></script>
</body>
</html>
