<!DOCTYPE html>
<html lang="ku">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🕵️ یاری جاسوس — ئۆنلاین</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap');
:root{
  --bg:#070910;--c1:#0d1120;--c2:#131929;
  --border:rgba(255,255,255,.08);
  --accent:#7c6fff;--green:#05d49e;--red:#ef233c;--gold:#ffd166;
  --muted:#5e6e8a;--text:#e4e8f5;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;direction:rtl}

/* pages */
.pg{display:none;min-height:100vh;align-items:center;justify-content:center;padding:16px;flex-direction:column}
.pg.on{display:flex}

/* card */
.card{background:var(--c1);border:1px solid var(--border);border-radius:20px;padding:24px 20px;width:100%;max-width:420px}
.ctitle{font-size:1.5rem;font-weight:900;margin-bottom:4px}
.csub{color:var(--muted);font-size:13px;margin-bottom:20px}

/* form */
label{display:block;font-size:12px;color:var(--muted);margin:14px 0 4px}
input{width:100%;padding:13px 15px;border-radius:12px;border:1.5px solid var(--border);background:var(--c2);color:var(--text);font-family:inherit;font-size:16px;outline:none;transition:border-color .2s}
input:focus{border-color:var(--accent)}
input::placeholder{color:var(--muted)}

/* buttons */
.btn{display:block;width:100%;padding:15px;margin-top:12px;border:none;border-radius:14px;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;transition:transform .1s,opacity .2s}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.3;cursor:not-allowed;transform:none!important}
.bp{background:var(--accent);color:#fff}
.bg{background:var(--green);color:#06140f}
.br{background:var(--red);color:#fff}
.bd{background:var(--c2);color:var(--text);border:1px solid var(--border)}

/* tabs */
.tabs{display:flex;gap:8px;margin-bottom:20px}
.tab{flex:1;padding:11px;border-radius:12px;border:1.5px solid transparent;background:var(--c2);color:var(--muted);font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;margin:0;transition:all .2s}
.tab.on{background:rgba(124,111,255,.15);color:var(--accent);border-color:var(--accent)}

/* code display */
.bigcode{font-size:3rem;font-weight:900;letter-spacing:12px;text-align:center;color:var(--gold);padding:16px 0;cursor:pointer;user-select:all}
.codehint{text-align:center;color:var(--muted);font-size:12px}

/* player item */
.pitem{display:flex;align-items:center;justify-content:space-between;background:var(--c2);border-radius:12px;padding:11px 14px;margin-bottom:7px;border:1px solid var(--border);animation:fadeup .3s ease}
@keyframes fadeup{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:none}}
.pleft{display:flex;align-items:center;gap:9px;font-size:15px;font-weight:700}
.pdot{width:8px;height:8px;border-radius:50%;background:var(--green);flex-shrink:0}
.badge{font-size:10px;padding:2px 8px;border-radius:8px;font-weight:700}
.bhost{background:rgba(124,111,255,.25);color:var(--accent)}
.bme{background:rgba(5,212,158,.2);color:var(--green)}
.pkick{background:rgba(239,35,60,.12);border:1px solid rgba(239,35,60,.3);color:var(--red);border-radius:8px;padding:4px 10px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit}

/* divider */
.hr{height:1px;background:var(--border);margin:16px 0}

/* timer */
#gtimer{font-size:3rem;font-weight:900;text-align:center;letter-spacing:4px;padding:14px;border-radius:18px;background:var(--c2);border:1px solid var(--border);margin-bottom:14px}
#gtimer.red{color:var(--red);animation:blink 1s infinite}
@keyframes blink{50%{opacity:.4}}

/* role cards */
.rcard{border-radius:18px;padding:20px 16px;text-align:center;margin:12px 0;line-height:1.9}
.rcard .em{font-size:2.4rem;display:block}
.rcard .wd{font-size:1.8rem;font-weight:900;display:block;margin-top:2px}
.rspy{background:rgba(239,35,60,.18);border:1.5px solid var(--red)}
.rnorm{background:rgba(5,212,158,.18);border:1.5px solid var(--green)}

/* hint */
.hintbox{background:rgba(255,209,102,.08);border:1px solid rgba(255,209,102,.3);border-radius:12px;padding:11px 15px;font-size:14px;margin-bottom:12px;text-align:center;display:none}

/* vote */
.vgrid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:10px}
.vbtn{margin:0;padding:13px 8px;border-radius:14px;background:rgba(255,209,102,.08);border:1.5px solid rgba(255,209,102,.3);color:var(--gold);font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:background .15s}
.vbtn:hover{background:rgba(255,209,102,.18)}
.vbtn:disabled{opacity:.3;cursor:not-allowed}

/* result */
.resbox{border-radius:18px;padding:20px 16px;text-align:center;font-size:1rem;line-height:2;margin:14px 0}
.rwin{background:rgba(5,212,158,.1);border:1.5px solid var(--green)}
.rlose{background:rgba(239,35,60,.1);border:1.5px solid var(--red)}

/* misc */
.status{text-align:center;color:var(--muted);font-size:13px;margin:8px 0}
.err{color:var(--red);text-align:center;font-size:13px;margin-top:8px;min-height:18px}
.ok{color:var(--green);text-align:center;font-size:12px;min-height:16px}
.dots::after{content:'';animation:dt 1.2s steps(4,end) infinite}
@keyframes dt{0%{content:'.'}33%{content:'..'}66%,100%{content:'...'}}
.spin{width:40px;height:40px;border-radius:50%;border:3px solid rgba(255,255,255,.08);border-top-color:var(--accent);animation:sp .8s linear infinite;margin:0 auto 16px}
@keyframes sp{to{transform:rotate(360deg)}}
.rrow{display:flex;justify-content:space-between;align-items:center;background:var(--c2);border-radius:10px;padding:10px 14px;margin-top:12px;font-size:14px}
.srow{display:flex;justify-content:space-between;margin-bottom:10px;font-size:14px}
.srow span:first-child{color:var(--muted)}

/* toast */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--c2);border:1px solid var(--border);border-radius:12px;padding:10px 20px;font-size:13px;font-weight:700;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;z-index:999}
#toast.show{opacity:1}
</style>
</head>
<body>
<div id="toast"></div>

<!-- PAGE: LOADING -->
<div class="pg on" id="pgLoad">
  <div class="card" style="text-align:center;padding:40px 24px">
    <div class="spin"></div>
    <div class="ctitle" style="font-size:1.2rem">ئامادەکاری<span class="dots"></span></div>
    <p class="csub" style="margin-top:6px">تکایە چاوەڕوان بە</p>
  </div>
</div>

<!-- PAGE: HOME -->
<div class="pg" id="pgHome">
  <div class="card">
    <div class="ctitle">🕵️ یاری جاسوس</div>
    <p class="csub">یاری ئۆنلاین — بەیەکەوە یاری بکە</p>
    <div class="tabs">
      <button class="tab on" id="tbC" onclick="swTab('c')">🆕 دروستکردن</button>
      <button class="tab"    id="tbJ" onclick="swTab('j')">🔗 بەشداربوون</button>
    </div>
    <div id="panC">
      <label>👤 ناوت</label>
      <input id="cName" type="text" placeholder="ناوت بنووسە" maxlength="14">
      <label>👥 ژمارەی پلەیەرەکان</label>
      <input id="cPlayers" type="number" min="2" max="20" value="6">
      <label>🕵️ ژمارەی جاسوسەکان</label>
      <input id="cSpies" type="number" min="1" max="5" value="1">
      <label>⏱️ ماوە (خولەک)</label>
      <input id="cMins" type="number" min="1" max="20" value="5">
      <button class="btn bp" onclick="createRoom()">🚀 دروستکردنی ژوور</button>
    </div>
    <div id="panJ" style="display:none">
      <label>👤 ناوت</label>
      <input id="jName" type="text" placeholder="ناوت بنووسە" maxlength="14">
      <label>🔑 کۆدی ژوور</label>
      <input id="jCode" type="text" placeholder="AB12" maxlength="4"
             style="letter-spacing:10px;text-align:center;font-size:2rem;font-weight:900;text-transform:uppercase"
             oninput="this.value=this.value.toUpperCase()">
      <button class="btn bg" onclick="joinRoom()">🔗 بەشداربوون</button>
    </div>
    <div id="homeErr" class="err"></div>
  </div>
</div>

<!-- PAGE: LOBBY -->
<div class="pg" id="pgLobby">
  <div class="card">
    <div class="ctitle">🏠 ژووری چاوەڕوان</div>
    <div class="bigcode" id="lobCode" onclick="copyCode()">----</div>
    <p class="codehint">👆 کرتە بکەرەوە بۆ کۆپی — کۆدەکە بنێرە بۆ هاوڕێکانت</p>
    <div class="ok" id="copyOk"></div>
    <div class="hr"></div>
    <div class="srow"><span>پلەیەرەکان</span><span><b id="lobCount">0</b> / <b id="lobMax">6</b></span></div>
    <div id="lobList"></div>
    <div class="hr"></div>
    <div id="hostArea" style="display:none">
      <button class="btn bg" id="startBtn" onclick="hostStart()" disabled>▶️ دەستپێکردنی یاری</button>
      <p class="status" id="hostHint" style="font-size:12px"></p>
    </div>
    <div id="guestArea" style="display:none">
      <p class="status">⏳ چاوەڕوانی هۆستەکە<span class="dots"></span></p>
    </div>
    <button class="btn bd" onclick="leaveRoom()" style="margin-top:8px">🚪 چوونەدەرەوە</button>
    <div id="lobErr" class="err"></div>
  </div>
</div>

<!-- PAGE: REVEAL -->
<div class="pg" id="pgReveal">
  <div class="card" style="text-align:center">
    <div class="ctitle" id="rvTitle">ڕۆڵەکەت ببینە</div>
    <p class="csub">تەنها تۆ ببینە!</p>
    <button class="btn bp" id="rvBtn" onclick="doReveal()">👁️ پیشاندانی ڕۆڵ</button>
    <div id="rvCard" style="display:none"></div>
    <div id="rvWait" style="display:none">
      <div class="rrow">
        <span>ئامادەن:</span>
        <b><span id="rvReady">0</span> / <span id="rvTotal">0</span></b>
      </div>
      <p class="status" style="font-size:12px">چاوەڕوانی هاوڕێکانت<span class="dots"></span></p>
    </div>
  </div>
</div>

<!-- PAGE: GAME -->
<div class="pg" id="pgGame" style="padding-top:16px;padding-bottom:30px">
  <div class="card">
    <div id="gtimer">⏱️ 00:00</div>
    <div class="hintbox" id="hintBox"></div>
    <div class="rcard" id="gameRole"></div>
    <div class="hr"></div>
    <div style="text-align:center;font-weight:700;margin-bottom:8px">🗳️ دەنگ بدە — جاسوس کێیە؟</div>
    <p class="status" id="vMsg"></p>
    <div class="vgrid" id="vGrid"></div>
    <div id="gameRes" style="display:none"></div>
    <div id="gameEnd" style="display:none">
      <button class="btn bg" onclick="playAgain()">🔄 یاری نوێ (هەمان کەس)</button>
      <button class="btn bd" onclick="leaveRoom()" style="margin-top:8px">🏠 دەرچوون</button>
    </div>
  </div>
</div>

<script>
// ════════════════════════════════════════════════
//  SUPABASE CONFIG
//  ئەم پرۆژەیە تایبەتە بۆ ئەم یاریە
// ════════════════════════════════════════════════
const SB_URL = "https://tkqmtzmcqdqijzmjxpfl.supabase.co";
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRrcW10em1jcWRxaWp6bWp4cGZsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDg4NTU5MDEsImV4cCI6MjA2NDQzMTkwMX0.Mq2kqH5C3vSdL2F8pQbVxN1zT9yGhWkRfmJoLdEuYsA";

// ════════════════════════════════════════════════
//  WORDS
// ════════════════════════════════════════════════
const WORDS=[
  {cat:"شار/ووڵات",hint:"شوێنێکی ناسراو",items:["سلێمانی","هەولێر","دهۆک","کرکوک","بەغدا","کەنەدا","ئەمەریکا","نیۆڕک","لەندەن","پاریس","ئیتالیا","ئالمانیا","تورکیا","ئێران","ژاپۆن","دوبەی","بارسەلۆنا"]},
  {cat:"خواردن",hint:"خواردنێکی ناسراو",items:["کەباب","پیتزا","بەریانی","دۆنەر","ماسی","برنج","یاپراخ","شفتە","کفتە","مریشک","گۆشت","سووپ","هەمبەرگەر","پاستا","ساندویچ","لازانیا","سوشی","شاورما"]},
  {cat:"سۆشیال میدیا",hint:"پلاتفۆرمی ئینتەرنێت",items:["یوتوب","تیکتۆک","فەیسبووک","ئینستاگرام","ئێکس","تویچ","سناپ","دیسکۆرد","واتساپ","تێلێگرام","لینکدین","پینتەرست"]},
  {cat:"ئاژەڵ",hint:"زیندووەکان",items:["سەگ","پشیلە","مانگا","مار","گوورگ","شێر","بزن","کەر","مەیموون","ووشتر","کۆتر","قاز","نەهەنگ","زەرافە","فیل","ئەسپ","ببر","پلەنگ"]},
  {cat:"شت/بێگیان",hint:"شتێکی ڕۆژانە",items:["کورسی","فڕن","قەنەفە","زۆپا","سەیارە","تەیارە","مۆبایل","تەلەفزیۆن","بەلەم","بەرد","جل","کاتژمێر","لاپتۆپ","فریدجەر","ماکرۆوێف"]},
  {cat:"وەرزش",hint:"چالاکییەکی جەستەیی",items:["فوتبۆل","بەسکێتبۆل","تێنیس","موی تای","شناکردن","والێبۆل","بۆکس","گۆڵف","کرکێت","ڕووکردن","تەکواندۆ","جووجیتسو"]},
  {cat:"فیلم",hint:"فیلمێکی ناسراو",items:["تایتانیک","ئەڤاتار","ئینسێپشن","ئینتەرستێلار","مەتریکس","گودفادەر","هاری پۆتەر","باتمان","سوپەرمان","جۆکەر","ئەڤنجەرز"]},
  {cat:"پیشە",hint:"کارێکی مرۆڤ",items:["دکتۆر","مامۆستا","ئەندازیار","پۆلیس","پەرستار","شۆفێر","وەرزشکار","کۆمیکان","نووسەر","دیزاینەر","ئاشپەز","دەلاڵ"]}
];
function pickSecret(){const g=WORDS[Math.floor(Math.random()*WORDS.length)];return{word:g.items[Math.floor(Math.random()*g.items.length)],cat:g.cat,hint:g.hint}}

// ════════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════════
let sb=null, ch=null, timerID=null;
let myId='', myName='', roomCode='', isHost=false;
let myRole='', myWord='', myCat='', myHint='';
let myVoted=false, myRevealed=false;

// Room state (host owns truth, broadcasts to all)
let RS = {
  players:{},      // {id:{name,host,ts}}
  status:'lobby',  // lobby|reveal|playing
  settings:{players:6,spies:1,mins:5},
  roles:{},        // {id:'spy'|'normal'}
  spies:[],
  secret:{},
  readyCnt:0,
  totalPlayers:0,
  result:null
};

// ════════════════════════════════════════════════
//  UTILS
// ════════════════════════════════════════════════
function uid(){return Math.random().toString(36).substr(2,8)}
function genCode(){const c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';return[0,0,0,0].map(()=>c[Math.floor(Math.random()*c.length)]).join('')}
function goPage(id){document.querySelectorAll('.pg').forEach(p=>p.classList.remove('on'));document.getElementById(id).classList.add('on')}
function toast(msg){const e=document.getElementById('toast');e.innerText=msg;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),2400)}
function setErr(id,m){const e=document.getElementById(id);if(e)e.innerText=m}
function stopTimer(){clearInterval(timerID);timerID=null}

// ════════════════════════════════════════════════
//  LOAD SUPABASE
// ════════════════════════════════════════════════
function loadSB(){
  return new Promise((ok,fail)=>{
    if(window.supabase){sb=window.supabase.createClient(SB_URL,SB_KEY);ok();return}
    const s=document.createElement('script');
    s.src='https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js';
    s.onload=()=>{sb=window.supabase.createClient(SB_URL,SB_KEY);ok()};
    s.onerror=fail;
    document.head.appendChild(s);
  });
}

(async()=>{
  try{
    await loadSB();
    goPage('pgHome');
  }catch(e){
    document.getElementById('pgLoad').innerHTML=`
      <div class="card" style="text-align:center;padding:32px 20px;max-width:420px">
        <div style="font-size:2.5rem;margin-bottom:14px">📡</div>
        <div class="ctitle">ئینتەرنێت پشکنین</div>
        <p class="csub" style="margin-top:6px">پەیوەندی ئینتەرنێتت بپشکنە، دوای ئەوە:</p>
        <button class="btn bp" onclick="location.reload()">🔄 دووبارە هەوڵبدەوە</button>
      </div>`;
  }
})();

// ════════════════════════════════════════════════
//  CHANNEL SETUP
//  All communication goes through ONE channel per room
//  Events: SYNC (host→all), JOIN, READY, VOTE, LEAVE
// ════════════════════════════════════════════════
function setupChannel(code){
  if(ch){ch.unsubscribe();ch=null}

  ch=sb.channel(`spy:${code}`,{config:{broadcast:{self:false}}});

  // HOST receives these from guests:
  ch.on('broadcast',{event:'JOIN'},({payload})=>{
    if(!isHost)return;
    if(RS.status!=='lobby')return; // don't allow join mid-game
    if(!RS.players[payload.id]){
      RS.players[payload.id]={name:payload.name,host:false,ts:Date.now()};
      hostSync(); // broadcast updated state
    }
  });

  ch.on('broadcast',{event:'READY'},({payload})=>{
    if(!isHost)return;
    RS.readyCnt=(RS.readyCnt||0)+1;
    if(RS.readyCnt>=RS.totalPlayers){
      RS.status='playing';
    }
    hostSync();
  });

  ch.on('broadcast',{event:'VOTE'},({payload})=>{
    if(!isHost)return;
    if(RS.result)return; // already voted
    const spies=RS.spies||[];
    const players=RS.players||{};
    const caught=spies.includes(payload.targetId);
    const spyNames=spies.map(id=>players[id]?.name||'?').join('، ');
    RS.result={votedId:payload.targetId,votedName:payload.targetName,caught,spyNames};
    hostSync();
  });

  ch.on('broadcast',{event:'LEAVE'},({payload})=>{
    if(!isHost)return;
    delete RS.players[payload.id];
    hostSync();
  });

  ch.on('broadcast',{event:'PING'},({payload})=>{
    // Guest wants latest state — host sends it
    if(isHost) hostSync();
  });

  // ALL receive SYNC from host:
  ch.on('broadcast',{event:'SYNC'},({payload})=>{
    if(isHost)return; // host doesn't process its own syncs (self=false)
    applySync(payload);
  });

  ch.subscribe(status=>{
    if(status==='SUBSCRIBED'){
      if(isHost){
        hostSync(); // announce initial state
      } else {
        // Ask host for state
        ch.send({type:'broadcast',event:'PING',payload:{id:myId}});
        // Also send join
        ch.send({type:'broadcast',event:'JOIN',payload:{id:myId,name:myName}});
      }
    }
  });
}

// ════════════════════════════════════════════════
//  HOST: broadcast full state
// ════════════════════════════════════════════════
function hostSync(){
  if(!ch||!isHost)return;
  ch.send({type:'broadcast',event:'SYNC',payload:RS});
  // Host also applies to own UI
  applySync(RS,true);
}

// ════════════════════════════════════════════════
//  APPLY SYNC STATE — routes to correct page
// ════════════════════════════════════════════════
function applySync(state, fromHost=false){
  // Check if kicked
  if(state.players && !state.players[myId] && RS.players && RS.players[myId]){
    stopTimer();
    if(ch){ch.unsubscribe();ch=null}
    myId='';roomCode='';isHost=false;
    goPage('pgHome');
    toast('❌ هۆستەکە تۆی دەریکرد');
    return;
  }

  const prev=RS.status;
  RS=state;

  // Sync my role
  if(RS.roles&&RS.roles[myId]){
    myRole=RS.roles[myId];
    myWord=RS.secret?.word||'';
    myCat=RS.secret?.cat||'';
    myHint=RS.secret?.hint||'';
  }

  // Route by status
  if(RS.status==='lobby'){
    renderLobby();
    const cur=document.querySelector('.pg.on');
    if(!cur||cur.id!=='pgLobby') goPage('pgLobby');
  } else if(RS.status==='reveal'){
    if(prev!=='reveal'){
      myRevealed=false;
      goPage('pgReveal');
      initReveal();
    } else {
      updateRevealCount();
    }
  } else if(RS.status==='playing'){
    if(prev!=='playing'){
      goPage('pgGame');
      initGame();
    }
  }

  // Show result if game is playing
  if(RS.result && document.getElementById('pgGame').classList.contains('on')){
    showResult(RS.result);
  }
}

// ════════════════════════════════════════════════
//  TABS
// ════════════════════════════════════════════════
window.swTab=function(t){
  document.getElementById('panC').style.display=t==='c'?'block':'none';
  document.getElementById('panJ').style.display=t==='j'?'block':'none';
  document.getElementById('tbC').classList.toggle('on',t==='c');
  document.getElementById('tbJ').classList.toggle('on',t==='j');
  setErr('homeErr','');
};

// ════════════════════════════════════════════════
//  CREATE ROOM
// ════════════════════════════════════════════════
window.createRoom=function(){
  const name=document.getElementById('cName').value.trim();
  const players=+document.getElementById('cPlayers').value;
  const spies=+document.getElementById('cSpies').value;
  const mins=+document.getElementById('cMins').value;
  if(!name){setErr('homeErr','⚠️ ناوت بنووسە');return}
  if(spies>=players){setErr('homeErr','⚠️ ژمارەی جاسوس زیادتره');return}
  setErr('homeErr','');

  myId=uid(); myName=name; isHost=true; roomCode=genCode();
  RS={
    players:{[myId]:{name,host:true,ts:Date.now()}},
    status:'lobby',
    settings:{players,spies,mins},
    roles:{},spies:[],secret:{},
    readyCnt:0,totalPlayers:0,result:null
  };

  setupChannel(roomCode);
  goPage('pgLobby');
  document.getElementById('lobCode').innerText=roomCode;
  document.getElementById('lobMax').innerText=players;
  renderLobby();
};

// ════════════════════════════════════════════════
//  JOIN ROOM
// ════════════════════════════════════════════════
window.joinRoom=function(){
  const name=document.getElementById('jName').value.trim();
  const code=document.getElementById('jCode').value.trim().toUpperCase();
  if(!name){setErr('homeErr','⚠️ ناوت بنووسە');return}
  if(!code){setErr('homeErr','⚠️ کۆدی ژوور بنووسە');return}
  setErr('homeErr','');

  myId=uid(); myName=name; isHost=false; roomCode=code;
  goPage('pgLobby');
  document.getElementById('lobCode').innerText=code;
  document.getElementById('lobList').innerHTML='<p class="status">پەیوەندی<span class="dots"></span></p>';

  setupChannel(roomCode);
};

// ════════════════════════════════════════════════
//  LOBBY RENDER
// ════════════════════════════════════════════════
function renderLobby(){
  const pl=RS.players||{};
  const arr=Object.entries(pl);
  const maxP=RS.settings?.players||6;

  document.getElementById('lobCount').innerText=arr.length;
  document.getElementById('lobMax').innerText=maxP;

  const el=document.getElementById('lobList');
  el.innerHTML='';
  arr.sort((a,b)=>(a[1].ts||0)-(b[1].ts||0)).forEach(([id,p])=>{
    const d=document.createElement('div');
    d.className='pitem';
    d.innerHTML=`
      <div class="pleft">
        <div class="pdot"></div>
        <span>${p.name}</span>
        ${p.host?'<span class="badge bhost">هۆست</span>':''}
        ${id===myId?'<span class="badge bme">تۆ</span>':''}
      </div>
      ${isHost&&id!==myId?`<button class="pkick" onclick="kickPlayer('${id}','${p.name}')">❌</button>`:''}`;
    el.appendChild(d);
  });

  if(isHost){
    document.getElementById('hostArea').style.display='block';
    document.getElementById('guestArea').style.display='none';
    const ok=arr.length>=2;
    document.getElementById('startBtn').disabled=!ok;
    document.getElementById('hostHint').innerText=ok
      ?`✅ ${arr.length} پلەیەر ئامادەن — دەتوانیت دەستپێبکەیت`
      :'⚠️ کەمترین ٢ پلەیەر پێویستە';
  }else{
    document.getElementById('hostArea').style.display='none';
    document.getElementById('guestArea').style.display='block';
  }
}

// ════════════════════════════════════════════════
//  KICK
// ════════════════════════════════════════════════
window.kickPlayer=function(id,name){
  if(!isHost)return;
  if(!confirm(`دەتەوێت ${name} دەری بکەیت؟`))return;
  delete RS.players[id];
  hostSync();
  toast(`✅ ${name} دەرکرا`);
};

// ════════════════════════════════════════════════
//  COPY CODE
// ════════════════════════════════════════════════
window.copyCode=function(){
  navigator.clipboard.writeText(roomCode).catch(()=>{});
  const el=document.getElementById('copyOk');
  el.innerText='✅ کۆدی ژوور کۆپی کرا!';
  setTimeout(()=>el.innerText='',2200);
};

// ════════════════════════════════════════════════
//  HOST START GAME
// ════════════════════════════════════════════════
window.hostStart=function(){
  if(!isHost)return;
  const pIds=Object.keys(RS.players);
  const spyCnt=RS.settings.spies;
  if(pIds.length<2){setErr('lobErr','⚠️ کەمترین ٢ پلەیەر');return}
  if(spyCnt>=pIds.length){setErr('lobErr','⚠️ جاسوس زیادە');return}
  setErr('lobErr','');

  const shuffled=[...pIds].sort(()=>Math.random()-.5);
  const spyIds=shuffled.slice(0,spyCnt);
  const roles={};
  pIds.forEach(id=>{roles[id]=spyIds.includes(id)?'spy':'normal'});

  RS.status='reveal';
  RS.roles=roles;
  RS.spies=spyIds;
  RS.secret=pickSecret();
  RS.readyCnt=0;
  RS.totalPlayers=pIds.length;
  RS.result=null;

  hostSync();
};

// ════════════════════════════════════════════════
//  REVEAL PAGE
// ════════════════════════════════════════════════
function initReveal(){
  document.getElementById('rvTitle').innerText=`👤 ${myName}`;
  document.getElementById('rvBtn').disabled=false;
  document.getElementById('rvCard').style.display='none';
  document.getElementById('rvWait').style.display='none';
  document.getElementById('rvTotal').innerText=RS.totalPlayers;
  document.getElementById('rvReady').innerText=RS.readyCnt||0;
}

function updateRevealCount(){
  document.getElementById('rvReady').innerText=RS.readyCnt||0;
  document.getElementById('rvTotal').innerText=RS.totalPlayers;
}

window.doReveal=function(){
  if(myRevealed)return;
  myRevealed=true;
  document.getElementById('rvBtn').disabled=true;
  const el=document.getElementById('rvCard');
  el.style.display='block';

  if(myRole==='spy'){
    el.innerHTML=`<div class="rcard rspy">
      <span class="em">🕵️</span>
      تۆ <b>جاسوسیت!</b>
      <span class="wd">جۆر: ${myCat}</span>
      <small style="opacity:.7;font-size:12px">وشەی نهێنی نازانیت!</small>
    </div>`;
  }else{
    el.innerHTML=`<div class="rcard rnorm">
      <span class="em">✅</span>
      تۆ <b>شارەزایی!</b>
      <span class="wd">📌 ${myWord}</span>
      <small style="opacity:.6;font-size:12px">ئەم وشەیە بپارێزە!</small>
    </div>`;
  }
  document.getElementById('rvWait').style.display='block';

  if(isHost){
    RS.readyCnt=(RS.readyCnt||0)+1;
    if(RS.readyCnt>=RS.totalPlayers)RS.status='playing';
    hostSync();
  }else{
    ch.send({type:'broadcast',event:'READY',payload:{id:myId}});
  }
};

// ════════════════════════════════════════════════
//  GAME PAGE
// ════════════════════════════════════════════════
function initGame(){
  stopTimer();
  myVoted=false;
  document.getElementById('hintBox').style.display='none';
  document.getElementById('gameRes').style.display='none';
  document.getElementById('gameEnd').style.display='none';
  document.getElementById('vMsg').innerText='';
  document.getElementById('gtimer').classList.remove('red');

  // Role reminder
  const re=document.getElementById('gameRole');
  if(myRole==='spy'){
    re.className='rcard rspy';
    re.innerHTML=`🕵️ تۆ <b>جاسوسیت</b> — جۆر: <b>${myCat}</b>`;
  }else{
    re.className='rcard rnorm';
    re.innerHTML=`📌 وشەکە: <b>${myWord}</b>`;
  }

  // Timer
  const mins=RS.settings?.mins||5;
  let t=mins*60, half=Math.floor(t/2), hintShown=false;
  updateClock(t);
  timerID=setInterval(()=>{
    t--;
    updateClock(t);
    if(t<=10)document.getElementById('gtimer').classList.add('red');
    if(!hintShown&&t<=half){
      hintShown=true;
      const hb=document.getElementById('hintBox');
      hb.style.display='block';
      hb.innerHTML=`💡 <b>هینتی دووەم:</b> ${myHint}`;
    }
    if(t<=0)stopTimer();
  },1000);

  // Vote buttons
  const grid=document.getElementById('vGrid');
  grid.innerHTML='';
  Object.entries(RS.players).forEach(([id,p])=>{
    const b=document.createElement('button');
    b.className='vbtn';
    b.innerText=`🧑 ${p.name}`;
    b.onclick=()=>castVote(id,p.name);
    grid.appendChild(b);
  });
}

function updateClock(t){
  const m=String(Math.floor(t/60)).padStart(2,'0');
  const s=String(t%60).padStart(2,'0');
  document.getElementById('gtimer').innerText=`⏱️ ${m}:${s}`;
}

// ════════════════════════════════════════════════
//  VOTE
// ════════════════════════════════════════════════
window.castVote=function(targetId,targetName){
  if(myVoted)return;
  myVoted=true;
  stopTimer();
  document.querySelectorAll('.vbtn').forEach(b=>b.disabled=true);
  document.getElementById('vMsg').innerText=`⌛ دەنگت دا بۆ ${targetName}...`;

  if(isHost){
    const spies=RS.spies||[];
    const players=RS.players||{};
    const caught=spies.includes(targetId);
    const spyNames=spies.map(id=>players[id]?.name||'?').join('، ');
    RS.result={votedId:targetId,votedName:targetName,caught,spyNames};
    hostSync();
  }else{
    ch.send({type:'broadcast',event:'VOTE',payload:{targetId,targetName}});
  }
};

function showResult(r){
  if(document.getElementById('gameRes').style.display==='block')return;
  stopTimer();
  document.getElementById('vGrid').innerHTML='';
  document.getElementById('vMsg').innerText='';
  const el=document.getElementById('gameRes');
  el.style.display='block';
  if(r.caught){
    el.className='resbox rwin';
    el.innerHTML=`🎉 <b>سەرکەوتن!</b><br>جاسوس <b>${r.votedName}</b> دەستگیر کرا!<br>
      <small style="opacity:.7">جاسوسەکان: ${r.spyNames}</small><br>
      <small style="opacity:.7">وشەی نهێنی: <b style="color:var(--gold)">${myRole!=='spy'?myWord:'—'}</b></small>`;
  }else{
    el.className='resbox rlose';
    el.innerHTML=`😈 <b>جاسوسەکە بردی!</b><br>دەنگت دا بۆ <b>${r.votedName}</b><br>
      <small style="opacity:.7">جاسوسەکان: ${r.spyNames}</small><br>
      <small style="opacity:.7">وشەی نهێنی: <b style="color:var(--gold)">${myRole!=='spy'?myWord:'—'}</b></small>`;
  }
  document.getElementById('gameEnd').style.display='block';
}

// ════════════════════════════════════════════════
//  PLAY AGAIN
// ════════════════════════════════════════════════
window.playAgain=function(){
  if(!isHost){toast('⏳ تەنها هۆست دەتوانێت دووبارە دەستی پێبکات');return}
  stopTimer();
  RS.status='lobby';
  RS.roles={};RS.spies=[];RS.secret={};
  RS.readyCnt=0;RS.totalPlayers=0;RS.result=null;
  hostSync();
};

// ════════════════════════════════════════════════
//  LEAVE
// ════════════════════════════════════════════════
window.leaveRoom=function(){
  stopTimer();
  if(ch){
    if(isHost){
      delete RS.players[myId];
      hostSync();
    }else{
      ch.send({type:'broadcast',event:'LEAVE',payload:{id:myId}});
    }
    setTimeout(()=>{ch.unsubscribe();ch=null},300);
  }
  myId='';myName='';roomCode='';isHost=false;
  myRole='';myWord='';myCat='';myHint='';
  myVoted=false;myRevealed=false;
  goPage('pgHome');
};

window.addEventListener('beforeunload',()=>{
  if(ch){
    if(!isHost)ch.send({type:'broadcast',event:'LEAVE',payload:{id:myId}});
    ch.unsubscribe();
  }
});
</script>
</body>
</html>
